user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting ────────────────────────────────────────────────
    # Global zone: 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=global:16m rate=10r/s;
    # API zone: stricter, 5 req/sec
    limit_req_zone $binary_remote_addr zone=api:8m rate=5r/s;
    # Auth zone: very strict, 2 req/sec
    limit_req_zone $binary_remote_addr zone=auth:4m rate=2r/s;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=addr:8m;

    # ── Upstream ─────────────────────────────────────────────────────
    upstream jobnest_app {
        server web:3000;
        keepalive 32;
    }

    # ── Server ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Request ID propagation
        add_header X-Request-Id $request_id always;

        # Client limits
        client_max_body_size 10m;
        client_body_timeout 30s;
        client_header_timeout 10s;

        # ── Static Assets (Next.js /_next/static) ──────────────────
        location /_next/static/ {
            proxy_pass http://jobnest_app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status "STATIC";
            proxy_set_header Host $host;
        }

        # ── Public files ───────────────────────────────────────────
        location /public/ {
            proxy_pass http://jobnest_app;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Auth endpoints (strict rate limit) ─────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn addr 10;
            proxy_pass http://jobnest_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 30s;
        }

        # ── API endpoints ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://jobnest_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # ── All other requests ────────────────────────────────────
        location / {
            limit_req zone=global burst=30 nodelay;
            proxy_pass http://jobnest_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        # ── Health check (no rate limit) ──────────────────────────
        location = /api/health {
            proxy_pass http://jobnest_app;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Block common attack paths ─────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi)$ {
            return 404;
        }

        location ~ /\. {
            deny all;
        }
    }
}
