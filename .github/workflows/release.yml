name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jobnest

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Full Quality Gate (required before release)
  # ─────────────────────────────────────────────────────────────────
  release-quality:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production

  # ─────────────────────────────────────────────────────────────────
  # Build and Push Container to GHCR
  # ─────────────────────────────────────────────────────────────────
  container-publish:
    name: Build & Push Container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [release-quality]

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=git-

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_TELEMETRY_DISABLED=1
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_SHA=${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [container-publish]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          echo "## Release ${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Docker Image" >> release_notes.md
          echo '```' >> release_notes.md
          echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:${VERSION}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Digest" >> release_notes.md
          echo "\`${{ needs.container-publish.outputs.image-digest }}\`" >> release_notes.md
          if [ -n "$PREV_TAG" ]; then
            echo "" >> release_notes.md
            echo "### Changes since ${PREV_TAG}" >> release_notes.md
            git log --oneline "${PREV_TAG}..${VERSION}" --pretty="format:- %s (%h)" >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          generate_release_notes: false
