name: Security Scan

on:
  schedule:
    # Every Monday at 08:00 IST (02:30 UTC)
    - cron: '30 2 * * 1'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Parse Audit Results
        run: |
          VULNS=$(node -e "
            const r = require('./audit-report.json');
            const m = r.metadata?.vulnerabilities || {};
            const total = (m.high || 0) + (m.critical || 0);
            console.log(total);
          ")
          echo "High/Critical vulnerabilities found: $VULNS"
          if [ "$VULNS" -gt 0 ]; then
            echo "::error::Found $VULNS high/critical vulnerabilities. Review audit-report.json"
            exit 1
          fi

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json
          retention-days: 30

  secret-scan:
    name: Secret Pattern Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan for Secret Patterns
        run: |
          FAILED=0

          patterns=(
            "AKIA[0-9A-Z]{16}"                    # AWS Access Key
            "-----BEGIN RSA PRIVATE KEY-----"      # RSA private key
            "-----BEGIN OPENSSH PRIVATE KEY-----"  # SSH private key
            "sk_live_[0-9a-zA-Z]{24}"             # Stripe live secret
            "rzp_live_[0-9a-zA-Z]{14}"            # Razorpay live key
          )

          for pattern in "${patterns[@]}"; do
            if grep -rqE "$pattern" \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" \
              --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
              .; then
              echo "::error::Potential secret pattern found: $pattern"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 0 ]; then
            echo "✓ No secret patterns detected in source code."
          else
            exit 1
          fi

  docker-security:
    name: Docker Image Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: jobnest:security-scan
          cache-from: type=gha

      - name: Verify Non-Root User
        run: |
          USER=$(docker inspect jobnest:security-scan --format='{{.Config.User}}')
          if [ "$USER" = "nextjs" ] || [ "$USER" = "1001" ]; then
            echo "✓ Container runs as non-root user: $USER"
          else
            echo "✗ Container may run as root. Found user: $USER"
            exit 1
          fi
